<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Покойо 67 City Boy Эпштейн - Кликер!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🏴‍☠️ ПОКОЙО 67 CITY BOY ЭПШТЕЙН 🏴‍☠️</h1>
            <div class="stats">
                <div class="coins-display">
                    <span class="coin-icon">🪙</span>
                    <span id="coins">0</span>
                    <span class="coin-name">Монеток</span>
                </div>
                <div class="per-second">
                    <span>💸</span>
                    <span id="per-second">0</span>
                    <span>/сек</span>
                </div>
            </div>
        </header>

        <main class="game-main">
            <section class="click-area">
                <div class="clicker-container">
                    <img id="clicker-image" 
                         src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQawPAoVkU4umNb4HbAd6Vl63XA50wNmqEpfw&s" 
                         alt="Бомж" 
                         class="clicker-image">
                    <div class="click-effect" id="click-effect">+1</div>
                </div>
                <div class="click-power">
                    Сила клика: <span id="click-power">1</span> 🪙
                </div>
            </section>

            <section class="upgrades-section">
                <h2>🛒 УЛУЧШЕНИЯ ДЛЯ ПОКОЙО 🛒</h2>
                <div class="upgrades-grid" id="upgrades-grid">
                    <!-- Улучшения будут добавлены через JavaScript -->
                </div>
            </section>
        </main>

        <footer class="game-footer">
            <p>💤 Стань самым крутым City Boy в городе! 💤</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
